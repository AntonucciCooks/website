  <title>FAQ | Antonucci Cooks | Personal Chef &amp; Nutrition Coach | Baltimore</title>

  <meta name="description" content="Frequently asked questions about Antonucci Cooks' personal chef services, pricing, dietary accommodations, and booking process in Baltimore.">
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What areas do you serve?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "I serve clients throughout Baltimore City and the surrounding communities. If you're unsure whether you're within my service area, please reach out. I'd be happy to discuss your location."
        }
      },
      {
        "@type": "Question",
        "name": "How much does weekly personal chef service cost?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Weekly Personal Chef Service starts at $350 per visit, plus the cost of groceries. Pricing varies based on household size, number of meals requested, dietary needs, and service frequency. During our consultation, I'll learn more about your needs and provide a customized quote."
        }
      },
      {
        "@type": "Question",
        "name": "How are groceries handled?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Groceries are billed separately at cost, with no markup. I'll shop for the ingredients needed for your approved menu and provide receipts for all purchases."
        }
      },
      {
        "@type": "Question",
        "name": "Do I need to be home while you cook?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Many clients choose to be away while I cook and return to a refrigerator stocked with meals for the week. As long as I have access to your kitchen, I'll take care of the rest."
        }
      },
      {
        "@type": "Question",
        "name": "How often do you cook for clients?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Most clients choose weekly or bi-weekly service, but occasional meal prep visits are also available."
        }
      },
      {
        "@type": "Question",
        "name": "Can I request specific meals?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Absolutely. One of my favorite parts of this work is getting to know my clients and creating meals they'll genuinely enjoy. Whether there's a family favorite you'd love to see on the menu or a new cuisine you'd like to explore, I'll work with you to create meals that fit your tastes and goals."
        }
      },
      {
        "@type": "Question",
        "name": "Can you accommodate food allergies and special diets?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. I regularly accommodate food allergies, food sensitivities, gluten-free diets, low-FODMAP diets, vegetarian preferences, and other specialized dietary requirements. I am happy to consult with your physician or nutrition team if you have specific needs I am unfamiliar with."
        }
      },
      {
        "@type": "Question",
        "name": "Do you work with clients taking GLP-1 medications?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. I have a particular interest in supporting clients taking GLP-1 medications and those who have undergone bariatric surgery. When appetite is limited, it's important to make every bite count. I can help create meals that prioritize protein, balanced nutrition, and flavor while supporting your individual goals."
        }
      },
      {
        "@type": "Question",
        "name": "What happens during the consultation?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We'll discuss your favorite foods, dietary needs, allergies, health goals, household size, cooking preferences, and any foods you'd rather avoid. This conversation helps me create menus that feel personalized and realistic for your lifestyle."
        }
      },
      {
        "@type": "Question",
        "name": "What do I need to provide?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "You'll need a functional kitchen with basic cookware, refrigerator space for prepared meals, and basic pantry staples such as oils, spices, and condiments. We'll discuss this during your consultation."
        }
      },
      {
        "@type": "Question",
        "name": "Will my kitchen be clean when you leave?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Before I leave, I'll clean the kitchen and return it to the condition I found it in. The only evidence I've been there should be the meals waiting for you in the refrigerator."
        }
      },
      {
        "@type": "Question",
        "name": "Do you offer meal delivery?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "At this time, I primarily provide in-home personal chef services. Cooking in your home allows me to keep costs down and ensure your meals are prepared and stored exactly the way you'd like."
        }
      },
      {
        "@type": "Question",
        "name": "Are you insured?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. I am ServSafe certified and carry professional liability insurance for your peace of mind and mine."
        }
      },
      {
        "@type": "Question",
        "name": "Do you offer dinner parties and special events?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. I offer intimate dinner parties for up to 8 guests as well as cocktail parties, showers, brunches, and other small gatherings. Every event menu is customized to your preferences and the style of event you're hosting."
        }
      },
      {
        "@type": "Question",
        "name": "How far in advance should I book an event?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "I recommend booking as early as possible, especially for weekends and holiday seasons. If your event is coming up soon, please reach out anyway. I may still have availability."
        }
      },
      {
        "@type": "Question",
        "name": "How do I get started?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Simply reach out through the contact form to schedule a complimentary consultation. I'd love to learn more about you, your goals, and how I can help make mealtimes easier and more enjoyable."
        }
      }
    ]
  }
  </script>
