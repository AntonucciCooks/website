<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Antonucci Cooks | Personal Chef &amp; Nutrition Coach | Baltimore</title>
  <link rel="icon" type="image/svg+xml" href="antonucci-cooks-logo.svg">
  <meta name="description" content="Contact Antonucci Cooks to schedule a complimentary consultation for personal chef services, dinner parties, or special events in Baltimore.">
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f5efe4;
      --cream-dark: #ede4d3;
      --green-dark: #4a5c35;
      --text: #1e2e22;
      --text-muted: #5a6e5f;
      --border: #d6cfc4;
      --nav-text: #1e2e22;
    }
    body { font-family: 'Lato', sans-serif; font-weight: 400; background-color: var(--cream); color: var(--text); line-height: 1.8; }
    nav { background: linear-gradient(135deg, #cfe1b9 0%, #b6c99b 50%, #98a87c 100%); padding: 1rem 2rem; }
    nav ul { list-style: none; display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; }
    nav ul li a { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; text-decoration: none; color: var(--nav-text); font-family: 'Lato', sans-serif; font-size: 0.8rem; letter-spacing: 0.06em; opacity: 0.9; transition: opacity 0.2s; }
    nav ul li a:hover { opacity: 1; }
    nav ul li a .nav-icon { width: 52px; height: 52px; }
    header { background: linear-gradient(135deg, #cfe1b9 0%, #b6c99b 50%, #98a87c 100%); padding: 2.5rem 2rem 2rem; text-align: center; border-bottom: 2px solid rgba(255,255,255,0.2); }
    header .site-name { font-family: 'Lato', sans-serif; font-size: 2rem; font-weight: 300; letter-spacing: 0.12em; color: var(--nav-text); }
    header .tagline { font-family: 'Lato', sans-serif; font-size: 0.9rem; font-style: italic; font-weight: 300; color: var(--nav-text); opacity: 0.8; margin-top: 0.4rem; letter-spacing: 0.05em; }
    main { max-width: 680px; margin: 0 auto; padding: 3.5rem 2rem 4rem; }
    h1 { font-family: 'Lato', sans-serif; font-size: 1.8rem; font-weight: 300; margin-bottom: 1.75rem; line-height: 1.3; color: var(--green-dark); }
    h2 { font-family: 'Lato', sans-serif; font-size: 1.3rem; font-weight: 300; margin-bottom: 1.5rem; margin-top: 3rem; color: var(--green-dark); }
    p { font-size: 1.05rem; margin-bottom: 1.5rem; color: var(--text); }

    form { margin-top: 1rem; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.95rem; color: var(--green-dark); margin-bottom: 0.4rem; font-weight: 400; }
    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 0.75rem;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      background-color: #ffffff;
      color: var(--text);
    }
    input:focus { outline: 2px solid var(--green-dark); outline-offset: 1px; }

    fieldset { border: 1px solid var(--border); border-radius: 3px; padding: 1rem 1.25rem; background-color: var(--cream-dark); }
    legend { font-size: 0.95rem; color: var(--green-dark); padding: 0 0.4rem; }
    .checkbox-option { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; }
    .checkbox-option:last-child { margin-bottom: 0; }
    .checkbox-option input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--green-dark); cursor: pointer; }
    .checkbox-option label { margin-bottom: 0; font-size: 1rem; color: var(--text); cursor: pointer; }

    button[type="submit"] {
      margin-top: 1rem;
      padding: 0.85rem 2.25rem;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      color: var(--cream);
      background-color: var(--green-dark);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button[type="submit"]:hover { opacity: 0.88; }

    .instagram-note { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); font-size: 1rem; color: var(--text-muted); }
    .instagram-note a { color: var(--green-dark); text-decoration: none; border-bottom: 1px solid var(--border); }
    .instagram-note a:hover { border-bottom-color: var(--green-dark); }

    footer { background: linear-gradient(135deg, #cfe1b9 0%, #b6c99b 50%, #98a87c 100%); padding: 1.5rem 2rem 2rem; text-align: center; font-size: 0.85rem; color: var(--nav-text); font-family: 'Lato', sans-serif; }
    footer a { color: var(--nav-text); text-decoration: none; opacity: 0.85; }
    footer a:hover { opacity: 1; }
    footer .footer-copy { margin-bottom: 1.25rem; opacity: 0.8; }
    footer nav ul { background: none; padding: 0; }
  </style>
</head>
